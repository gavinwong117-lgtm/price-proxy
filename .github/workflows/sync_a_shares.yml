name: 每日A股价格同步

on:
  schedule:
    # 每个工作日 10:00/12:00/14:00/16:00 北京时间 = 02:00/04:00/06:00/08:00 UTC
    - cron: '0 2,4,6,8 * * 1-5'
  workflow_dispatch:   # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install --upgrade akshare requests

      - name: 同步A股价格到 Cloudflare KV
        env:
          CF_ACCOUNT_ID:     ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN:      ${{ secrets.CF_API_TOKEN }}
        run: python sync_a_shares.py
