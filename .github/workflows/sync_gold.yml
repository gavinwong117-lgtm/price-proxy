name: 黄金价格同步（上金所）

on:
  schedule:
    # 每个工作日 08:00 北京时间 = 00:00 UTC
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install akshare requests

      - name: 同步黄金价格到 Cloudflare KV
        env:
          CF_ACCOUNT_ID:      ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN:       ${{ secrets.CF_API_TOKEN }}
        run: python sync_gold.py
